<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Sim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    #top-bar {
      background: #16213e;
      padding: 0.6rem 1.4rem;
      display: flex;
      gap: 2rem;
      align-items: center;
      border-bottom: 2px solid #0f3460;
      flex-shrink: 0;
      height: 50px;
    }
    #top-bar .tb-label { color: #a8dadc; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; }
    #top-bar .tb-value { font-size: 1.05rem; font-weight: bold; color: #eee; }
    #top-bar .tb-item  { display: flex; flex-direction: column; }

    /* ── MAIN GRID ── */
    #main-grid {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 50px);
    }

    /* ── STAT PANEL — always visible, never scrolls with log ── */
    #stat-panel {
      width: 270px;
      min-width: 240px;
      background: #16213e;
      border-right: 2px solid #0f3460;
      padding: 1rem;
      overflow-y: auto;
      flex-shrink: 0;
      /* sticky: height fills viewport minus topbar */
      height: 100%;
    }
    #stat-panel h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8dadc;
      margin: 1rem 0 0.45rem;
    }
    #stat-panel h3:first-child { margin-top: 0; }

    .stat-row { margin-bottom: 0.5rem; }
    .stat-row .stat-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      margin-bottom: 2px;
      color: #ccc;
    }
    .stat-row .stat-label span { color: #a8dadc; font-weight: bold; }
    .bar-track { height: 6px; background: #0f3460; border-radius: 4px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 4px; transition: width 0.45s ease; }

    .bar-health { background: #57c27e; }
    .bar-mood   { background: #a8dadc; }
    .bar-agency { background: #e94560; }
    .bar-eq     { background: #f4a261; }
    .bar-self   { background: #c77dff; }
    .bar-conf   { background: #74c0fc; }
    .bar-social { background: #69db7c; }
    .bar-nutr   { background: #ffd43b; }
    .bar-threat { background: #e94560; }

    .threat-row.high .bar-fill { animation: threat-pulse 1s ease infinite alternate; }
    @keyframes threat-pulse { from { opacity: 1; } to { opacity: 0.45; } }

    .tier-badge {
      display: inline-block;
      font-size: 0.6rem;
      background: #0f3460;
      color: #a8dadc;
      border-radius: 3px;
      padding: 0 3px;
      margin-left: 3px;
      vertical-align: middle;
    }

    /* ── RIGHT COLUMN ── */
    #narrative-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%;
    }

    /* ── YEAR LOG — scrollable history ── */
    #story-log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem 0.5rem;
      display: flex;
      flex-direction: column-reverse; /* newest year at top */
      gap: 0;
    }

    /* ── YEAR CARD ── */
    .year-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }
    .year-card.current {
      border-color: #e94560;
      box-shadow: 0 0 0 1px rgba(233,69,96,0.2);
    }

    .year-card-header {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 0.55rem;
    }
    .year-card.current .year-card-header { color: #e94560; }

    .year-card-narrative {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #ccc;
      margin-bottom: 0.7rem;
    }

    /* event block inside card */
    .year-event-block {
      border-top: 1px solid #0f3460;
      margin-top: 0.65rem;
      padding-top: 0.65rem;
    }
    .year-event-title {
      font-size: 0.72rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 0.3rem;
    }
    .year-event-choice {
      font-size: 0.78rem;
      color: #666;
      font-style: italic;
      margin-bottom: 0.4rem;
    }
    .year-event-outcome {
      font-size: 0.86rem;
      line-height: 1.6;
    }
    .year-event-outcome.good    { color: #57c27e; }
    .year-event-outcome.neutral { color: #aaa; }
    .year-event-outcome.bad     { color: #e94560; }

    /* milestone line */
    .year-milestone {
      font-size: 0.84rem;
      color: #a8dadc;
      line-height: 1.6;
      margin-bottom: 0.7rem;
      border-left: 2px solid #a8dadc;
      padding-left: 0.7rem;
    }

    /* level-up line */
    .year-levelup {
      font-size: 0.8rem;
      color: #c77dff;
      margin-bottom: 0.5rem;
      padding-left: 0.7rem;
      border-left: 2px solid #c77dff;
    }

    /* ── STAT DELTA PILLS ── */
    .delta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.65rem;
      padding-top: 0.55rem;
      border-top: 1px solid #0f3460;
    }
    .delta-pill {
      font-size: 0.68rem;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }
    .delta-pill.pos  { background: rgba(87,194,126,0.15); color: #57c27e; }
    .delta-pill.neg  { background: rgba(233,69,96,0.15);  color: #e94560; }
    .delta-pill.neut { background: rgba(128,128,128,0.12); color: #888; }

    /* ── ACTION AREA ── */
    #action-area {
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 0.8rem 1.1rem;
      flex-shrink: 0;
    }
    #action-area .prompt-line {
      font-size: 0.8rem;
      color: #a8dadc;
      margin-bottom: 0.55rem;
      letter-spacing: 0.3px;
    }
    #actions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.65rem;
    }
    .action-btn {
      padding: 0.38rem 0.78rem;
      font-size: 0.8rem;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .action-btn:hover:not(:disabled) { background: #1a4a8a; transform: scale(1.03); }
    .action-btn.selected { background: #e94560; color: #fff; }
    .action-btn:disabled { opacity: 0.32; cursor: not-allowed; }

    #bottom-row { display: flex; align-items: center; gap: 1rem; }
    #selections-info { font-size: 0.78rem; color: #666; flex: 1; }
    #next-year-btn {
      padding: 0.48rem 1.7rem;
      font-size: 0.92rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    #next-year-btn:hover { background: #c73652; transform: scale(1.04); }
    #next-year-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.hidden { display: none; }
    #modal-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      padding: 1.8rem 2rem;
      max-width: 520px;
      width: 94%;
      max-height: 88vh;
      overflow-y: auto;
    }
    #modal-box h2 { color: #e94560; margin-bottom: 0.7rem; font-size: 1.25rem; letter-spacing: 1px; }
    #modal-box h2.blue   { color: #a8dadc; }
    #modal-box h2.green  { color: #57c27e; }
    #modal-box h2.purple { color: #c77dff; }

    #modal-body { font-size: 0.88rem; line-height: 1.7; color: #ccc; margin-bottom: 1.1rem; }

    .outcome-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 0.65rem;
    }
    .outcome-tag.good    { background: rgba(87,194,126,0.15);  color: #57c27e; }
    .outcome-tag.neutral { background: rgba(128,128,128,0.12); color: #aaa; }
    .outcome-tag.bad     { background: rgba(233,69,96,0.15);   color: #e94560; }

    .modal-choice-btn {
      display: block;
      width: 100%;
      padding: 0.58rem 0.9rem;
      background: #0f3460;
      border: none;
      border-radius: 8px;
      color: #eee;
      cursor: pointer;
      font-size: 0.86rem;
      text-align: left;
      transition: background 0.15s;
      line-height: 1.4;
      margin-bottom: 0.45rem;
    }
    .modal-choice-btn:hover { background: #1a4a8a; }

    .modal-ok-btn {
      padding: 0.5rem 1.8rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .modal-ok-btn.red    { background: #e94560; color: #fff; }
    .modal-ok-btn.red:hover    { background: #c73652; }
    .modal-ok-btn.blue   { background: #a8dadc; color: #1a1a2e; }
    .modal-ok-btn.blue:hover   { background: #7cc9cc; }
    .modal-ok-btn.green  { background: #57c27e; color: #1a1a2e; }
    .modal-ok-btn.green:hover  { background: #3ea862; }
    .modal-ok-btn.purple { background: #c77dff; color: #1a1a2e; }
    .modal-ok-btn.purple:hover { background: #a855d4; }

    /* delta row inside modal */
    .modal-deltas { margin-top: 0.9rem; }
    .modal-deltas .delta-row { border-top: 1px solid #0f3460; padding-top: 0.5rem; }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0;
      background: #1a1a2e;
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    #intro-screen.hidden { display: none; }
    #intro-box { text-align: center; max-width: 460px; padding: 2rem; }
    #intro-box h1 { font-size: 2.6rem; color: #e94560; letter-spacing: 3px; margin-bottom: 0.4rem; }
    #intro-box .tagline { color: #a8dadc; font-size: 0.95rem; margin-bottom: 2rem; letter-spacing: 1px; }
    #intro-box input[type=text] {
      width: 100%; padding: 0.65rem 1rem;
      background: #16213e; border: 2px solid #0f3460; border-radius: 8px;
      color: #eee; font-size: 1rem; text-align: center; outline: none;
      margin-bottom: 1rem; transition: border-color 0.2s;
    }
    #intro-box input[type=text]:focus { border-color: #e94560; }
    #intro-box .start-btn {
      padding: 0.65rem 2.3rem; background: #e94560; border: none;
      border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer;
      letter-spacing: 1px; transition: background 0.2s, transform 0.1s;
    }
    #intro-box .start-btn:hover { background: #c73652; transform: scale(1.04); }
    #name-error { color: #e94560; font-size: 0.8rem; min-height: 1.2rem; margin-top: -0.5rem; margin-bottom: 0.5rem; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f3460; }
    ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro-screen">
  <div id="intro-box">
    <h1>LIFE SIM</h1>
    <p class="tagline">From 18 to the end — every year shapes the story.</p>
    <label style="display:block;margin-bottom:0.4rem;color:#888;font-size:0.82rem;">What is your name?</label>
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="24" autocomplete="off">
    <p id="name-error"></p>
    <button class="start-btn" id="start-btn">Begin</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="top-bar">
  <div class="tb-item"><span class="tb-label">Name</span><span class="tb-value" id="tb-name">—</span></div>
  <div class="tb-item"><span class="tb-label">Age</span><span class="tb-value" id="tb-age">18</span></div>
  <div class="tb-item"><span class="tb-label">Year</span><span class="tb-value" id="tb-year">1</span></div>
  <div class="tb-item" style="margin-left:auto"><span class="tb-label">Phase</span><span class="tb-value" id="tb-phase">—</span></div>
</div>

<!-- MAIN -->
<div id="main-grid">
  <!-- Stats: always in view, never hidden by log scroll -->
  <div id="stat-panel">
    <h3>Vitals</h3>
    <div id="vitals-bars"></div>
    <h3>Skills</h3>
    <div id="skills-bars"></div>
    <h3>Threats</h3>
    <div id="threat-bars"></div>
  </div>

  <!-- Right column: history log + action area -->
  <div id="narrative-area">
    <div id="story-log"></div>
    <div id="action-area">
      <p class="prompt-line">How do you spend this year? Choose up to 2 priorities.</p>
      <div id="actions-grid"></div>
      <div id="bottom-row">
        <span id="selections-info">No priorities chosen yet.</span>
        <button id="next-year-btn">Next Year</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div id="modal-choices"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const rand  = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;
const pick  = arr => arr[rand(0, arr.length - 1)];
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function cycler(arr) {
  let pool = [];
  return () => {
    if (!pool.length) pool = arr.map((_, i) => i);
    return arr[pool.splice(rand(0, pool.length - 1), 1)[0]];
  };
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let STATE = {};

function initNewGame(name) {
  STATE = {
    name, age: 18, year: 1, phase: 'playing',
    stats: {
      health: 85, mood: 60,
      agency: 30, emotionalIntelligence: 25,
      selfAwareness: 20, confidence: 30,
      social: 40, nutrition: 55
    },
    threats: { depression: 15, substanceAbuse: 0, loneliness: 30 },
    xp: { agency:0, emotionalIntelligence:0, selfAwareness:0, confidence:0, social:0, nutrition:0 },
    skillTiers: { agency:0, emotionalIntelligence:0, selfAwareness:0, confidence:0, social:0, nutrition:0 },
    log: [],          // array of year-card objects
    milestones: [],   // { year, age, text }
    flags: {
      hasJob: false, inRelationship: false,
      therapyStreak: 0, exerciseStreak: 0, substanceStreak: 0,
      milestonesShown: {},
      actionsChosenThisYear: []
    }
  };
  STATE.log.push({
    year: 0, age: 18,
    narrative: `You are ${name}, eighteen years old. The future stretches ahead like an unwritten page — wide, terrifying, yours.`,
    event: null, deltas: [], milestones: [], levelups: []
  });
  render();
}

// ════════════════════════════════════════════════
//  STAT SNAPSHOT + DELTA
// ════════════════════════════════════════════════
function snapshotState() {
  return {
    stats:   Object.assign({}, STATE.stats),
    threats: Object.assign({}, STATE.threats)
  };
}

const STAT_DISPLAY = {
  health: 'Health', mood: 'Mood', agency: 'Agency',
  emotionalIntelligence: 'E. Intel.', selfAwareness: 'Self-Aware.',
  confidence: 'Confidence', social: 'Social', nutrition: 'Nutrition'
};
const THREAT_DISPLAY = {
  depression: 'Depression', substanceAbuse: 'Substances', loneliness: 'Loneliness'
};

function computeDeltas(before, after) {
  const deltas = [];
  for (const [k, label] of Object.entries(STAT_DISPLAY)) {
    const diff = Math.round(after.stats[k] - before.stats[k]);
    if (diff !== 0) deltas.push({ label, diff, isThreat: false });
  }
  for (const [k, label] of Object.entries(THREAT_DISPLAY)) {
    const diff = Math.round(after.threats[k] - before.threats[k]);
    if (diff !== 0) deltas.push({ label, diff, isThreat: true });
  }
  return deltas;
}

function renderDeltaRow(deltas) {
  if (!deltas || !deltas.length) return '';
  const pills = deltas.map(d => {
    // positive for stats = good (green); positive for threats = bad (red)
    const isGood = d.isThreat ? d.diff < 0 : d.diff > 0;
    const cls = isGood ? 'pos' : 'neg';
    const sign = d.diff > 0 ? '+' : '';
    return `<span class="delta-pill ${cls}">${esc(d.label)} ${sign}${d.diff}</span>`;
  }).join('');
  return `<div class="delta-row">${pills}</div>`;
}

// ════════════════════════════════════════════════
//  NARRATIVE POOLS
// ════════════════════════════════════════════════
const OPENING_LINES = {
  highMood_strong: [
    "This year has a different quality to it — a clarity you have not felt in a while. You move through it with something approaching purpose.",
    "There are stretches this year where you feel genuinely like yourself. That sounds small. It is not.",
    "Looking back from the end of it, this was one of the better years. Not perfect, but real, and mostly good.",
    "You carry this year lightly. The problems are still there, but they fit in your hands.",
    "There is a confidence to your steps this year that did not used to be there. You notice it without making too much of it."
  ],
  highMood_fragile: [
    "The year is mostly good, but the goodness feels provisional — like weather you do not trust yet.",
    "You are okay this year. More than okay, some months. You take the good stretches for what they are.",
    "It is a moderate year — nothing extraordinary, nothing catastrophic. You are learning to appreciate that.",
    "The mood holds, mostly. There are dips, but they pass. You are getting better at waiting them out.",
    "You look back on this year with something like gratitude, though the gratitude is quieter than you expected."
  ],
  lowMood_fighting: [
    "You spend much of this year in a kind of low-grade struggle — not losing, exactly, but not winning either.",
    "It is a hard year. You get through it. That is the whole story, and it is enough.",
    "The weight is heavier than usual this year. You carry it anyway. Some days that is all you can say.",
    "There are weeks this year where just maintaining is the whole project. You do not always manage it.",
    "You push through this year on momentum and stubbornness. It costs something. You pay it."
  ],
  lowMood_sinking: [
    "This year is one you will not look back on with fondness. You survive it. That will have to be enough.",
    "Something has been pulling you down, and this year the pull is stronger. You are not sure how to name it.",
    "The year passes in a kind of grey. You go through the motions. The motions go through you.",
    "You are not well this year. You know it. Knowing does not fix it, but it is a start.",
    "There is a version of this year where things are different. You are not living that version."
  ]
};
const OPENERS = {};
for (const k in OPENING_LINES) OPENERS[k] = cycler(OPENING_LINES[k]);

const STAT_COMMENTARY = {
  loneliness_high: [
    "The distance between you and other people has become habitual this year. You are not sure when it started.",
    "You go weeks without a real conversation. The silence has stopped feeling temporary.",
    "There is an isolation to this year that you try not to examine too closely."
  ],
  depression_rising: [
    "Something in you is retreating — not all at once, just incrementally, the way water withdraws from a shore.",
    "The flat feeling has been reliable this year. You have made accommodations for it.",
    "You function. You do what needs to be done. The question of whether you are okay hovers unanswered."
  ],
  depression_high: [
    "There are months this year where the weight is structural — not something you carry, but something you live inside.",
    "The darkness is not dramatic. It is patient and ordinary and always there.",
    "You have stopped expecting much from yourself this year. That makes things easier and also worse."
  ],
  substance_rising: [
    "The drinking — or whatever it is — has become a more regular feature of the year than you would like to admit.",
    "You notice the pattern but give it different names depending on the day.",
    "The blurry evenings have multiplied. You tell yourself it is manageable. Mostly you believe it."
  ],
  health_low: [
    "Your body has been trying to tell you something this year. The signal is getting louder.",
    "The physical toll of recent years is more visible now. The mirror has started having opinions.",
    "Something is not right with the body. You have been deferring the conversation with it."
  ],
  mood_recovering: [
    "There are signs of something improving this year — tentative, not guaranteed, but real.",
    "You catch yourself in unguarded moments that feel almost like the old version of yourself.",
    "The recovery is slow and nonlinear, but it is happening. You choose to notice that."
  ]
};
const STAT_CYCLERS = {};
for (const k in STAT_COMMENTARY) STAT_CYCLERS[k] = cycler(STAT_COMMENTARY[k]);

const AGE_MILESTONES = {
  21: "You are twenty-one. Legally, fully adult. In practice, still making it up as you go — which, you suspect, never really changes.",
  25: "Twenty-five. The years have started to feel shorter and fuller simultaneously. You are not the same person who started this.",
  30: "Thirty. The number lands differently than you expected — less like an ending, more like a shift in the light.",
  35: "Thirty-five. You can feel the weight of what you have chosen, and also what you have not. Both are real.",
  40: "Forty. There is a clarity here that the younger version of you lacked the patience for. Things matter differently now.",
  50: "Fifty. Half a century. The mirror has stopped surprising you. You have learned to read it honestly.",
  60: "Sixty. You think about the people you have outlasted, and the ones who have outlasted you. Gratitude and grief are not opposites.",
  70: "Seventy. Time has a texture now — concentrated. Every year counts more than it used to."
};

function generateYearNarrative() {
  const { mood } = STATE.stats;
  const { depression } = STATE.threats;
  let q;
  if (mood >= 65 && depression < 40)      q = 'highMood_strong';
  else if (mood >= 50)                     q = 'highMood_fragile';
  else if (mood < 35 || depression > 65)  q = 'lowMood_sinking';
  else                                     q = 'lowMood_fighting';

  let parts = [OPENERS[q]()];

  const t = STATE.threats;
  const cands = [];
  if (t.loneliness > 55) cands.push('loneliness_high');
  if (t.depression > 40 && t.depression <= 65) cands.push('depression_rising');
  if (t.depression > 65) cands.push('depression_high');
  else if (t.depression > 20 && mood > 55) cands.push('mood_recovering');
  if (t.substanceAbuse > 30) cands.push('substance_rising');
  if (STATE.stats.health < 35) cands.push('health_low');
  if (cands.length) parts.push(STAT_CYCLERS[pick(cands)]());

  return parts.join(' ');
}

function checkAgeMilestone() {
  const ageInt = Math.floor(STATE.age);
  if (AGE_MILESTONES[ageInt] && !STATE.flags.milestonesShown[ageInt]) {
    STATE.flags.milestonesShown[ageInt] = true;
    return AGE_MILESTONES[ageInt];
  }
  return null;
}

    if (!a.tierReq) return true;
    for (const [sk, t] of Object.entries(a.tierReq))

//  XP + SKILL TIERS
// ════════════════════════════════════════════════
const XP_THRESHOLDS = [0, 80, 200, 400];
const TIER_NAMES    = { 0:'Novice', 1:'Developing', 2:'Capable', 3:'Mastered' };
const SKILL_LABELS  = {
  agency:'Agency', emotionalIntelligence:'Emotional Intel.',
  selfAwareness:'Self-Awareness', confidence:'Confidence',
  social:'Social', nutrition:'Nutrition'
};

function awardXP(xpMap) {
  const leveled = [];
  for (const [skill, amount] of Object.entries(xpMap)) {
    if (!(skill in STATE.xp)) continue;
    STATE.xp[skill] = (STATE.xp[skill] || 0) + amount;
    const newTier = computeTier(STATE.xp[skill]);
    if (newTier > (STATE.skillTiers[skill] || 0)) {
      STATE.skillTiers[skill] = newTier;
      leveled.push({ skill, tier: newTier });
    }
  }
  return leveled;
}
function computeTier(xp) {
  for (let i = XP_THRESHOLDS.length - 1; i >= 0; i--)
    if (xp >= XP_THRESHOLDS[i]) return i;
  return 0;
}

// ════════════════════════════════════════════════
//  PASSIVE EFFECTS  (yearly scale)
// ════════════════════════════════════════════════
function computeYearlyPassiveEffects(chosenActions) {
  const s = STATE;
  const chose = id => chosenActions.includes(id);

  // Baseline decay — every year
  s.threats.loneliness  = clamp(s.threats.loneliness + 5, 0, 100);
  s.stats.confidence    = clamp(s.stats.confidence - 3, 0, 100);
  s.stats.nutrition     = clamp(s.stats.nutrition - 25, 0, 100);

  // Conditional decay — if you didn't invest
  if (!chose('invest_relationships') && !chose('deep_bonds') && !chose('pursue_passion'))
    s.stats.social = clamp(s.stats.social - 6, 0, 100);
  if (!chose('work_hard') && !chose('take_risk') && !chose('seek_wisdom'))
    s.stats.agency = clamp(s.stats.agency - 4, 0, 100);

  // Age-based health decay (starts at 30, not 50)
  if (s.age > 30) s.stats.health = clamp(s.stats.health - Math.floor((s.age - 30) / 8), 0, 100);

  // Threat cascades
  if (s.threats.loneliness > 40)    s.threats.depression = clamp(s.threats.depression + 8, 0, 100);
  if (s.threats.substanceAbuse > 15) s.stats.health = clamp(s.stats.health - Math.floor(s.threats.substanceAbuse / 8), 0, 100);
  if (s.threats.depression > 40)    s.stats.mood = clamp(s.stats.mood - 12, 0, 100);
  if (s.stats.nutrition < 20)       s.stats.health = clamp(s.stats.health - 5, 0, 100);

  // Mood drift
  if (s.stats.mood > 40) s.stats.mood = clamp(s.stats.mood - 6, 0, 100);
  else                   s.stats.mood = clamp(s.stats.mood + 2, 0, 100);

  // Streak effects
  if (s.flags.substanceStreak > 2) s.threats.substanceAbuse = clamp(s.threats.substanceAbuse + 8, 0, 100);
  if (s.flags.therapyStreak > 2)   s.threats.depression     = clamp(s.threats.depression - 6, 0, 100);

  // Skill tier bonuses
  if (s.skillTiers.emotionalIntelligence >= 2) s.threats.loneliness = clamp(s.threats.loneliness - 7, 0, 100);
  const moodFloor = s.skillTiers.confidence >= 1 ? 12 : 0;
  if (s.stats.mood < moodFloor) s.stats.mood = moodFloor;
}

function checkDeathConditions() {
  const s = STATE;
  if (s.stats.health <= 0) return { cause:'health', text:'Your body gave out — worn down by years of neglect and circumstance. The end came quietly, in a hospital bed, with unfamiliar faces.' };
  if (s.threats.depression >= 90 && s.stats.agency <= 20) return { cause:'depression', text:'The darkness had been growing for a long time. In the end, it was simply too heavy to carry alone, and you had not let anyone close enough to help.' };
  if (s.threats.substanceAbuse >= 95) return { cause:'substances', text:'The substances that had once softened the edges eventually became the whole thing. An overdose. It was not entirely a surprise.' };
  if (s.age >= 80) return { cause:'age', text:'Eighty years. You made it. The body is done, but the life — the actual life — was full of more than you could have predicted at eighteen.' };
  return null;
}
function buildEpitaph(cause) {
  const t = STATE.skillTiers.selfAwareness, n = STATE.name;
  if (cause === 'age') {
    if (t >= 3) return `"${n} understood themselves, and in doing so, understood others. That is no small thing."`;
    if (t >= 2) return `"${n} tried to see clearly, even when it was painful. Most of the time, they succeeded."`;
    return `"${n} lived. Fully, imperfectly, and with occasional grace."`;
  }
  if (cause === 'depression') {
    if (t >= 2) return `"${n} saw the pattern but could not break it. They knew, at least, that it was not their fault."`;
    return `"${n} carried more than most people knew. The weight finally won."`;
  }
  if (cause === 'substances') {
    if (t >= 2) return `"${n} understood what was happening and could not stop it. Knowing and stopping are not the same thing."`;
    return `"${n} was looking for something. The substances were never it."`;
  }
  return `"${n} — brief, real, and more than the sum of their choices."`;
}

function rollOutcome(choiceMod = 0) {
  const statMod = ((STATE.stats.emotionalIntelligence + STATE.stats.selfAwareness) / 10) * 1.5;
  const roll = clamp(rand(1, 100) + statMod + choiceMod, 1, 115);
  if (roll > 65) return 'good';
  if (roll >= 35) return 'neutral';
  return 'bad';
}

function selectYearEvent() {
  const eligible = EVENTS.filter(e => e.condition(STATE));
  if (!eligible.length) return null;
  const total = eligible.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of eligible) { r -= e.weight; if (r <= 0) return e; }
  return eligible[eligible.length - 1];
}

//  APPLY ACTIONS + ADVANCE YEAR
// ════════════════════════════════════════════════
function applyActions(actionIds) {
  let allXP = {};
  let usedSub = false, usedEx = false, usedTh = false;
  for (const id of actionIds) {
    const a = ALL_ACTIONS.find(x => x.id === id);
    if (!a) continue;
    a.effect(STATE);
    for (const [k, v] of Object.entries(a.xp)) allXP[k] = (allXP[k] || 0) + v;
    if (id === 'drink_use')          usedSub = true;
    if (id === 'prioritize_health')  usedEx  = true;
    if (id === 'inner_work')         usedTh  = true;
  }
  if (!usedSub) STATE.flags.substanceStreak = 0;
  if (!usedEx)  STATE.flags.exerciseStreak  = 0;
  if (!usedTh)  STATE.flags.therapyStreak   = 0;
  return awardXP(allXP);
}

function advanceCalendar() {
  STATE.year++;
  STATE.age = 18 + (STATE.year - 1);
  STATE.flags.actionsChosenThisYear = [];
}

function render() {
  renderTopBar();
  renderStats();
  renderLog();
  renderActions();
}

function renderTopBar() {
  document.getElementById('tb-name').textContent  = STATE.name;
  document.getElementById('tb-age').textContent   = Math.floor(STATE.age);
  document.getElementById('tb-year').textContent  = STATE.year;
  document.getElementById('tb-phase').textContent = STATE.phase;
}

function renderStats() {
  const s = STATE.stats;
  const vitals = [
    { key:'health',    label:'Health',    cls:'bar-health' },
    { key:'mood',      label:'Mood',      cls:'bar-mood'   },
    { key:'social',    label:'Social',    cls:'bar-social' },
    { key:'nutrition', label:'Nutrition', cls:'bar-nutr'   }
  ];
  const skills = [
    { key:'agency',                label:'Agency',           cls:'bar-agency' },
    { key:'emotionalIntelligence', label:'Emotional Intel.', cls:'bar-eq'     },
    { key:'selfAwareness',         label:'Self-Awareness',   cls:'bar-self'   },
    { key:'confidence',            label:'Confidence',       cls:'bar-conf'   }
  ];
  document.getElementById('vitals-bars').innerHTML = vitals.map(v => barRow(v.label, s[v.key], v.cls)).join('');
  document.getElementById('skills-bars').innerHTML = skills.map(v => {
    const tier = STATE.skillTiers[v.key] || 0;
    const badge = tier > 0 ? `<span class="tier-badge">T${tier}</span>` : '';
    return barRow(v.label + badge, s[v.key], v.cls, true);
  }).join('');
  const t = STATE.threats;
  document.getElementById('threat-bars').innerHTML = [
    { key:'depression',     label:'Depression'     },
    { key:'substanceAbuse', label:'Substance Abuse' },
    { key:'loneliness',     label:'Loneliness'     }
  ].map(th => {
    const val = t[th.key];
    return `<div class="stat-row threat-row ${val > 70 ? 'high' : ''}">
      <div class="stat-label">${esc(th.label)}<span>${val}</span></div>
      <div class="bar-track"><div class="bar-fill bar-threat" style="width:${val}%"></div></div>
    </div>`;
  }).join('');
}

function barRow(label, value, cls, raw = false) {
  const pct = clamp(value, 0, 100);
  return `<div class="stat-row">
    <div class="stat-label">${raw ? label : esc(label)}<span>${Math.round(value)}</span></div>
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
  </div>`;
}

function renderLog() {
  const el = document.getElementById('story-log');
  // Render newest first (flex column-reverse means visual top = last in DOM)
  const cards = STATE.log.slice(-50);
  el.innerHTML = cards.map((card, i) => {
    const isCurrent = i === cards.length - 1;
    return renderYearCard(card, isCurrent);
  }).join('');
}

function renderYearCard(card, isCurrent) {
  const label = card.year === 0
    ? `Start · Age 18`
    : `Year ${card.year} · Age ${Math.floor(card.age)}`;

  let html = `<div class="year-card ${isCurrent ? 'current' : ''}">
    <div class="year-card-header">${label}</div>`;

  // milestones above narrative
  if (card.milestones && card.milestones.length)
    html += card.milestones.map(m => `<div class="year-milestone">${esc(m)}</div>`).join('');

  // level-ups
  if (card.levelups && card.levelups.length)
    html += card.levelups.map(l =>
      `<div class="year-levelup">${esc(SKILL_LABELS[l.skill] || l.skill)} reached Tier ${l.tier} — ${TIER_NAMES[l.tier]}</div>`
    ).join('');

  html += `<div class="year-card-narrative">${esc(card.narrative)}</div>`;

  // event block
  if (card.event) {
    const ev = card.event;
    html += `<div class="year-event-block">
      <div class="year-event-title">${esc(ev.title)}</div>
      <div class="year-event-choice">"${esc(ev.choiceLabel)}"</div>
      <div class="year-event-outcome ${ev.type}">${esc(ev.text)}</div>
    </div>`;
  }

  // stat deltas for the year
  if (card.deltas && card.deltas.length)
    html += renderDeltaRow(card.deltas);

  html += `</div>`;
  return html;
}

function renderActions() {
  const available = buildAvailableActions();
  const chosen    = STATE.flags.actionsChosenThisYear;

  document.getElementById('actions-grid').innerHTML = available.map(a => {
    const isChosen  = chosen.includes(a.id);
    const maxed     = chosen.length >= 2 && !isChosen;
    return `<button class="action-btn ${isChosen ? 'selected' : ''}" ${maxed ? 'disabled' : ''}
      data-id="${a.id}" title="${esc(a.desc)}">${esc(a.label)}</button>`;
  }).join('');

  document.querySelectorAll('.action-btn').forEach(btn =>
    btn.addEventListener('click', () => toggleAction(btn.dataset.id))
  );

  const n = chosen.length;
  document.getElementById('selections-info').textContent =
    n === 0 ? 'No priorities chosen yet.' : n === 1 ? '1 priority chosen.' : '2 priorities chosen.';
  document.getElementById('next-year-btn').disabled = false;
}

function toggleAction(id) {
  const chosen = STATE.flags.actionsChosenThisYear;
  const idx = chosen.indexOf(id);
  if (idx >= 0) chosen.splice(idx, 1);
  else if (chosen.length < 2) chosen.push(id);
  renderActions();
}

// ════════════════════════════════════════════════
//  NEXT YEAR
// ════════════════════════════════════════════════
document.getElementById('next-year-btn').addEventListener('click', () => {
  if (STATE.phase !== 'playing') return;
  endOfYear();
});

function endOfYear() {
  const snapshot  = snapshotState();
  const chosen    = STATE.flags.actionsChosenThisYear;
  const leveled   = applyActions(chosen);
  const narrative = generateYearNarrative();
  computeYearlyPassiveEffects(chosen);

  const death = checkDeathConditions();
  if (death) {
    STATE.phase = 'dead';
    const deltas = computeDeltas(snapshot, STATE);
    STATE.log.push({ year: STATE.year, age: STATE.age, narrative, event: null, deltas,
      milestones: [], levelups: leveled });
    advanceCalendar(); render();
    showDeathModal(death); return;
  }

  const milestone = checkAgeMilestone();
  const ev = selectYearEvent();

  // finalize: called after event resolution (or immediately if no event)
  function finalize(eventData) {
    const deltas = computeDeltas(snapshot, STATE);
    STATE.log.push({
      year: STATE.year, age: STATE.age,
      narrative, event: eventData || null, deltas,
      milestones: milestone ? [milestone] : [],
      levelups: leveled
    });
    advanceCalendar(); render();
  }

  const afterLevelup = () => {
    if (ev) showEventModal(ev, finalize);
    else finalize(null);
  };

  if (leveled.length > 0) showLevelUpModal(leveled, afterLevelup);
  else afterLevelup();
}

  document.getElementById('modal-title').className   = titleCls;
  document.getElementById('modal-body').innerHTML    = body;
  document.getElementById('modal-choices').innerHTML = choices;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function showEventModal(ev, finalize) {
  STATE.phase = 'event';
  const choicesHtml = ev.choices.map((c, i) =>
    `<button class="modal-choice-btn" data-idx="${i}">${esc(c.label)}</button>`
  ).join('');
  showModal(ev.title, '', esc(ev.text), choicesHtml);

  document.querySelectorAll('.modal-choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx       = parseInt(btn.dataset.idx, 10);
      const choice    = ev.choices[idx];
      const outcome   = rollOutcome(choice.modifier);
      const o         = (ev.choices[idx].outcomes || ev.outcomes)[outcome];
      if (o.stat) o.stat(STATE);
      if (o.xp)   awardXP(o.xp);

      // snapshot AFTER event effects for delta display in modal
      const eventData = { title: ev.title, choiceLabel: choice.label, text: o.text, type: outcome };

      // finalize pushes year card (deltas computed inside finalize, after event effects)
      finalize(eventData);

      // retrieve deltas from the just-pushed year card
      const yearCard  = STATE.log[STATE.log.length - 1];
      const deltaHtml = yearCard.deltas.length
        ? `<div class="modal-deltas"><p style="font-size:0.72rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Year summary</p>${renderDeltaRow(yearCard.deltas)}</div>`
        : '';

      const tagLabel   = outcome.charAt(0).toUpperCase() + outcome.slice(1);
      const titleCls   = outcome === 'good' ? 'green' : outcome === 'neutral' ? 'blue' : '';
      const btnCls     = outcome === 'good' ? 'green' : outcome === 'neutral' ? 'blue' : 'red';

      showModal(
        ev.title, titleCls,
        `<span class="outcome-tag ${outcome}">${tagLabel}</span>
         <p style="font-size:0.78rem;color:#666;font-style:italic;margin-bottom:0.7rem">"${esc(choice.label)}"</p>
         <p>${esc(o.text)}</p>${deltaHtml}`,
        `<button class="modal-ok-btn ${btnCls}" id="modal-cont">Continue</button>`
      );
      STATE.phase = 'playing';
      render();
      document.getElementById('modal-cont').addEventListener('click', () => {
        hideModal(); render();
      });
    });
  });
}

function showLevelUpModal(leveled, cb) {
  const lines = leveled.map(l =>
    `<strong>${esc(SKILL_LABELS[l.skill] || l.skill)}</strong> → Tier ${l.tier}: ${TIER_NAMES[l.tier]}`
  ).join('<br>');
  showModal('Growth', 'purple',
    lines + '<br><br>Something has solidified in you. A capability that used to require effort begins to feel like a reflex.',
    `<button class="modal-ok-btn purple" id="modal-lvl-ok">Continue</button>`
  );
  document.getElementById('modal-lvl-ok').addEventListener('click', () => { hideModal(); cb(); });
}

function showDeathModal(death) {
  const epitaph  = buildEpitaph(death.cause);
  const goodYrs  = STATE.log.filter(c => c.event && c.event.type === 'good').length;
  const badYrs   = STATE.log.filter(c => c.event && c.event.type === 'bad').length;
  const summary  =
    `<p style="color:#888;font-size:0.78rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.8rem">Life Summary</p>
     <p>${esc(death.text)}</p><br>
     <p style="color:#a8dadc;font-style:italic;margin-bottom:1.1rem">${esc(epitaph)}</p>
     <p style="font-size:0.8rem;color:#666;line-height:2">
       Years lived: ${STATE.year - 1} &nbsp;·&nbsp; Final age: ${Math.floor(STATE.age)}<br>
       Good outcomes: ${goodYrs} &nbsp;·&nbsp; Hard outcomes: ${badYrs}<br>
       Final health: ${STATE.stats.health} &nbsp;·&nbsp; Final mood: ${STATE.stats.mood}
     </p>`;
  const cls = death.cause === 'age' ? 'blue' : '';
  showModal(
    death.cause === 'age' ? 'A life fully lived' : 'The end', cls,
    summary,
    `<button class="modal-ok-btn ${cls || 'red'}" id="modal-restart">Play Again</button>`
  );
  document.getElementById('modal-restart').addEventListener('click', () => {
    hideModal();
    document.getElementById('intro-screen').classList.remove('hidden');
    document.getElementById('name-input').value = '';
    document.getElementById('story-log').innerHTML = '';
  });
}

// ════════════════════════════════════════════════
//  INTRO
// ════════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key==='Enter') startGame(); });

function startGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-error').textContent = 'Please enter a name.'; return; }
  document.getElementById('name-error').textContent = '';
  document.getElementById('intro-screen').classList.add('hidden');
  initNewGame(name);
}

document.getElementById('next-year-btn').disabled = true;
</script>
