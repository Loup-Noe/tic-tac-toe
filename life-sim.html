<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Sim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    #top-bar {
      background: #16213e;
      padding: 0.6rem 1.4rem;
      display: flex;
      gap: 2rem;
      align-items: center;
      border-bottom: 2px solid #0f3460;
      flex-shrink: 0;
    }
    #top-bar .tb-label { color: #a8dadc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    #top-bar .tb-value { font-size: 1.1rem; font-weight: bold; color: #eee; }
    #top-bar .tb-item  { display: flex; flex-direction: column; }

    /* ── MAIN GRID ── */
    #main-grid {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 50px);
    }

    /* ── STAT PANEL ── */
    #stat-panel {
      width: 280px;
      min-width: 240px;
      background: #16213e;
      border-right: 2px solid #0f3460;
      padding: 1rem;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #stat-panel h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8dadc;
      margin: 1rem 0 0.5rem;
    }
    #stat-panel h3:first-child { margin-top: 0; }

    .stat-row { margin-bottom: 0.55rem; }
    .stat-row .stat-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 2px;
      color: #ccc;
    }
    .stat-row .stat-label span { color: #a8dadc; font-weight: bold; }
    .bar-track { height: 7px; background: #0f3460; border-radius: 4px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

    .bar-health { background: #57c27e; }
    .bar-mood   { background: #a8dadc; }
    .bar-agency { background: #e94560; }
    .bar-eq     { background: #f4a261; }
    .bar-self   { background: #c77dff; }
    .bar-conf   { background: #74c0fc; }
    .bar-social { background: #69db7c; }
    .bar-nutr   { background: #ffd43b; }
    .bar-threat { background: #e94560; }

    .threat-row.high .bar-fill {
      animation: threat-pulse 1s ease infinite alternate;
    }
    @keyframes threat-pulse {
      from { opacity: 1; } to { opacity: 0.5; }
    }

    .tier-badge {
      display: inline-block;
      font-size: 0.65rem;
      background: #0f3460;
      color: #a8dadc;
      border-radius: 3px;
      padding: 0 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ── NARRATIVE AREA ── */
    #narrative-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #story-log {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column-reverse;
    }

    .log-entry { margin-bottom: 1.2rem; line-height: 1.65; font-size: 0.92rem; }
    .log-entry .log-meta {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .log-entry.type-event     .log-text { color: #f4a261; }
    .log-entry.type-death     .log-text { color: #e94560; }
    .log-entry.type-level     .log-text { color: #c77dff; }
    .log-entry.type-milestone .log-text { color: #a8dadc; }
    .log-entry.type-normal    .log-text { color: #ddd; }
    .log-entry.type-good      .log-text { color: #57c27e; }
    .log-entry.type-bad       .log-text { color: #e94560; }
    .log-entry.type-neutral   .log-text { color: #aaa; }

    /* ── ACTION AREA ── */
    #action-area {
      background: #16213e;
      border-top: 2px solid #0f3460;
      padding: 0.9rem 1.2rem;
      flex-shrink: 0;
    }

    #action-area .prompt-line {
      font-size: 0.82rem;
      color: #a8dadc;
      margin-bottom: 0.65rem;
      letter-spacing: 0.3px;
    }

    #actions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.75rem;
    }

    .action-btn {
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      border: none;
      border-radius: 6px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .action-btn:hover:not(:disabled) { background: #1a4a8a; transform: scale(1.03); }
    .action-btn.selected { background: #e94560; color: #fff; }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #bottom-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    #selections-info { font-size: 0.8rem; color: #888; flex: 1; }
    #next-year-btn {
      padding: 0.5rem 1.8rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    #next-year-btn:hover { background: #c73652; transform: scale(1.04); }
    #next-year-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.hidden { display: none; }

    #modal-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 14px;
      padding: 2rem 2.2rem;
      max-width: 540px;
      width: 94%;
      max-height: 85vh;
      overflow-y: auto;
    }
    #modal-box h2 { color: #e94560; margin-bottom: 0.8rem; font-size: 1.4rem; letter-spacing: 1px; }
    #modal-box h2.modal-title-blue   { color: #a8dadc; }
    #modal-box h2.modal-title-purple { color: #c77dff; }
    #modal-box h2.modal-title-green  { color: #57c27e; }

    #modal-body { font-size: 0.9rem; line-height: 1.7; color: #ccc; margin-bottom: 1.2rem; }

    .outcome-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 0.7rem;
    }
    .outcome-tag.good    { background: #1a3d28; color: #57c27e; }
    .outcome-tag.neutral { background: #2a2a3a; color: #aaa; }
    .outcome-tag.bad     { background: #3d1a20; color: #e94560; }

    #modal-choices { display: flex; flex-direction: column; gap: 0.5rem; }

    .modal-choice-btn {
      padding: 0.6rem 1rem;
      background: #0f3460;
      border: none;
      border-radius: 8px;
      color: #eee;
      cursor: pointer;
      font-size: 0.88rem;
      text-align: left;
      transition: background 0.15s;
      line-height: 1.4;
    }
    .modal-choice-btn:hover { background: #1a4a8a; }

    .modal-single-btn {
      padding: 0.55rem 2rem;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .modal-single-btn:hover  { background: #c73652; }
    .modal-single-btn.blue   { background: #a8dadc; color: #1a1a2e; }
    .modal-single-btn.blue:hover   { background: #7cc9cc; }
    .modal-single-btn.purple { background: #c77dff; color: #1a1a2e; }
    .modal-single-btn.purple:hover { background: #a855d4; }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #intro-screen.hidden { display: none; }

    #intro-box { text-align: center; max-width: 480px; padding: 2rem; }
    #intro-box h1 { font-size: 2.8rem; color: #e94560; letter-spacing: 3px; margin-bottom: 0.4rem; }
    #intro-box .tagline { color: #a8dadc; font-size: 1rem; margin-bottom: 2rem; letter-spacing: 1px; }
    #intro-box input[type=text] {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #eee;
      font-size: 1rem;
      text-align: center;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    #intro-box input[type=text]:focus { border-color: #e94560; }
    #intro-box .start-btn {
      padding: 0.7rem 2.5rem;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }
    #intro-box .start-btn:hover { background: #c73652; transform: scale(1.04); }
    #name-error { color: #e94560; font-size: 0.82rem; min-height: 1.2rem; margin-top: -0.5rem; margin-bottom: 0.5rem; }

    /* scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f3460; }
    ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 3px; }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro-screen">
  <div id="intro-box">
    <h1>LIFE SIM</h1>
    <p class="tagline">From 18 to the end — every year shapes the story.</p>
    <label style="display:block;margin-bottom:0.4rem;color:#888;font-size:0.85rem;">What is your name?</label>
    <input type="text" id="name-input" placeholder="Enter your name" maxlength="24" autocomplete="off">
    <p id="name-error"></p>
    <button class="start-btn" id="start-btn">Begin</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="top-bar">
  <div class="tb-item"><span class="tb-label">Name</span><span class="tb-value" id="tb-name">—</span></div>
  <div class="tb-item"><span class="tb-label">Age</span><span class="tb-value" id="tb-age">18</span></div>
  <div class="tb-item"><span class="tb-label">Year</span><span class="tb-value" id="tb-year">1</span></div>
  <div class="tb-item" style="margin-left:auto"><span class="tb-label">Phase</span><span class="tb-value" id="tb-phase">—</span></div>
</div>

<!-- MAIN -->
<div id="main-grid">
  <div id="stat-panel">
    <h3>Vitals</h3>
    <div id="vitals-bars"></div>
    <h3>Skills</h3>
    <div id="skills-bars"></div>
    <h3>Threats</h3>
    <div id="threat-bars"></div>
  </div>
  <div id="narrative-area">
    <div id="story-log"></div>
    <div id="action-area">
      <p class="prompt-line">How do you spend this year? Choose up to 2 priorities.</p>
      <div id="actions-grid"></div>
      <div id="bottom-row">
        <span id="selections-info">No priorities chosen yet.</span>
        <button id="next-year-btn">Next Year</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <h2 id="modal-title">Event</h2>
    <div id="modal-body"></div>
    <div id="modal-choices"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const rand  = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;
const pick  = arr => arr[rand(0, arr.length - 1)];

function cycler(arr) {
  let pool = [];
  return function() {
    if (!pool.length) pool = arr.map((_, i) => i);
    const idx = pool.splice(rand(0, pool.length - 1), 1)[0];
    return arr[idx];
  };
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let STATE = {};

function initNewGame(name) {
  STATE = {
    name,
    age: 18,
    year: 1,
    phase: 'playing',
    stats: {
      health: 85, mood: 60,
      agency: 30, emotionalIntelligence: 25,
      selfAwareness: 20, confidence: 30,
      social: 40, nutrition: 55
    },
    threats: { depression: 15, substanceAbuse: 0, loneliness: 30 },
    xp: { agency: 0, emotionalIntelligence: 0, selfAwareness: 0, confidence: 0, social: 0, nutrition: 0 },
    skillTiers: { agency: 0, emotionalIntelligence: 0, selfAwareness: 0, confidence: 0, social: 0, nutrition: 0 },
    log: [],
    flags: {
      hasJob: false, inRelationship: false,
      therapyStreak: 0, exerciseStreak: 0, substanceStreak: 0,
      milestonesShown: {},
      actionsChosenThisYear: [],
      pendingEvent: null
    }
  };
  appendLog(
    `You are ${name}, eighteen years old. The future stretches ahead like an unwritten page — wide, terrifying, yours.`,
    'milestone'
  );
  render();
}

// ════════════════════════════════════════════════
//  LOG
// ════════════════════════════════════════════════
function appendLog(text, type = 'normal') {
  STATE.log.push({ year: STATE.year, age: STATE.age, text, type });
}

// ════════════════════════════════════════════════
//  NARRATIVE POOLS
// ════════════════════════════════════════════════
const OPENING_LINES = {
  highMood_strong: [
    "This year has a different quality to it — a clarity you have not felt in a while. You move through it with something approaching purpose.",
    "There are stretches this year where you feel genuinely like yourself. That sounds small. It is not.",
    "Looking back from the end of it, this was one of the better years. Not perfect, but real, and mostly good.",
    "You carry this year lightly. The problems are still there, but they fit in your hands.",
    "There is a confidence to your steps this year that did not used to be there. You notice it without making too much of it."
  ],
  highMood_fragile: [
    "The year is mostly good, but the goodness feels provisional — like weather you do not trust yet.",
    "You are okay this year. More than okay, some months. You take the good stretches for what they are.",
    "It is a moderate year — nothing extraordinary, nothing catastrophic. You are learning to appreciate that.",
    "The mood holds, mostly. There are dips, but they pass. You are getting better at waiting them out.",
    "You look back at this year with something like gratitude, though the gratitude is quieter than you expected."
  ],
  lowMood_fighting: [
    "You spend much of this year in a kind of low-grade struggle — not losing, exactly, but not winning either.",
    "It is a hard year. You get through it. That is the whole story, and it is enough.",
    "The weight is heavier than usual this year. You carry it anyway. Some days that is all you can say.",
    "There are weeks this year where just maintaining is the whole project. You do not always manage it.",
    "You push through this year on momentum and stubbornness. It costs something. You pay it."
  ],
  lowMood_sinking: [
    "This year is one you will not look back on with fondness. You survive it. That will have to be enough.",
    "Something has been pulling you down, and this year the pull is stronger. You are not sure how to name it.",
    "The year passes in a kind of grey. You go through the motions. The motions go through you.",
    "You are not well this year. You know it. Knowing does not fix it, but it is a start.",
    "There is a version of this year where things are different. You are not living that version."
  ]
};

const OPENERS = {};
for (const k in OPENING_LINES) OPENERS[k] = cycler(OPENING_LINES[k]);

const STAT_COMMENTARY = {
  loneliness_high: [
    "The distance between you and other people has become habitual this year. You are not sure when it started.",
    "You go weeks without a real conversation. The silence has stopped feeling temporary.",
    "There is an isolation to this year that you try not to examine too closely."
  ],
  depression_rising: [
    "Something in you is retreating — not all at once, just incrementally, the way water withdraws from a shore.",
    "The flat feeling has been reliable this year. You have made accommodations for it.",
    "You function. You do what needs to be done. The question of whether you are okay hovers unanswered."
  ],
  depression_high: [
    "There are months this year where the weight is structural — not something you carry, but something you live inside.",
    "The darkness is not dramatic. It is patient and ordinary and always there.",
    "You have stopped expecting much from yourself this year. That makes things easier and also worse."
  ],
  substance_rising: [
    "The drinking — or whatever it is — has become a more regular feature of the year than you would like to admit.",
    "You notice the pattern but give it different names depending on the day.",
    "The blurry evenings have multiplied. You tell yourself it is manageable. Mostly you believe it."
  ],
  health_low: [
    "Your body has been trying to tell you something this year. The signal is getting louder.",
    "The physical toll of recent years is more visible now. The mirror has started having opinions.",
    "Something is not right with the body. You have been deferring the conversation with it."
  ],
  mood_recovering: [
    "There are signs of something improving this year — tentative, not guaranteed, but real.",
    "You catch yourself in unguarded moments that feel almost like the old version of yourself.",
    "The recovery is slow and nonlinear, but it is happening. You choose to notice that."
  ]
};
const STAT_CYCLERS = {};
for (const k in STAT_COMMENTARY) STAT_CYCLERS[k] = cycler(STAT_COMMENTARY[k]);

const AGE_MILESTONES = {
  21: "You are twenty-one. Legally, fully adult. In practice, still making it up as you go — which, you suspect, never really changes.",
  25: "Twenty-five. The years have started to feel shorter and fuller simultaneously. You are not the same person who started this.",
  30: "Thirty. The number lands differently than you expected — less like an ending, more like a shift in the light.",
  35: "Thirty-five. You can feel the weight of what you have chosen, and also what you have not. Both are real.",
  40: "Forty. There is a clarity here that the younger version of you lacked the patience for. Things matter differently now.",
  50: "Fifty. Half a century. The mirror has stopped surprising you. You have learned to read it honestly.",
  60: "Sixty. You think about the people you have outlasted, and the ones who have outlasted you. Gratitude and grief are not opposites.",
  70: "Seventy. Time has a texture now — concentrated. Every year counts more than it used to."
};

function generateYearNarrative() {
  const { mood } = STATE.stats;
  const { depression } = STATE.threats;
  const isHighMood = mood >= 50;
  const isStrong   = mood >= 65 && depression < 40;
  const isSinking  = mood < 35 || depression > 65;

  let quadrant;
  if (isStrong)       quadrant = 'highMood_strong';
  else if (isHighMood) quadrant = 'highMood_fragile';
  else if (isSinking)  quadrant = 'lowMood_sinking';
  else                 quadrant = 'lowMood_fighting';

  let parts = [OPENERS[quadrant]()];

  // stat commentary
  const t = STATE.threats;
  const candidates = [];
  if (t.loneliness > 55) candidates.push('loneliness_high');
  if (t.depression > 40 && t.depression <= 65) candidates.push('depression_rising');
  if (t.depression > 65) candidates.push('depression_high');
  else if (t.depression > 20 && STATE.stats.mood > 55) candidates.push('mood_recovering');
  if (t.substanceAbuse > 30) candidates.push('substance_rising');
  if (STATE.stats.health < 35) candidates.push('health_low');

  if (candidates.length > 0) parts.push(STAT_CYCLERS[pick(candidates)]());

  // age milestone
  const ageInt = Math.floor(STATE.age);
  if (AGE_MILESTONES[ageInt] && !STATE.flags.milestonesShown[ageInt]) {
    STATE.flags.milestonesShown[ageInt] = true;
    appendLog(AGE_MILESTONES[ageInt], 'milestone');
  }

  return parts.join(' ');
}

// ════════════════════════════════════════════════
//  ACTIONS  (yearly priorities, no energy cost)
// ════════════════════════════════════════════════
const ALL_ACTIONS = [
  {
    id: 'prioritize_health', label: 'Prioritize health',
    desc: 'Regular exercise, proper sleep, medical check-ups.',
    effect(s) {
      s.stats.health    = clamp(s.stats.health + 12, 0, 100);
      s.stats.mood      = clamp(s.stats.mood + 6, 0, 100);
      s.stats.confidence = clamp(s.stats.confidence + 4, 0, 100);
      s.threats.depression = clamp(s.threats.depression - 8, 0, 100);
      s.flags.exerciseStreak = (s.flags.exerciseStreak || 0) + 1;
    },
    xp: { confidence: 15 }
  },
  {
    id: 'eat_well', label: 'Eat well',
    desc: 'Consistent attention to nutrition throughout the year.',
    effect(s) {
      s.stats.health    = clamp(s.stats.health + 8, 0, 100);
      s.stats.nutrition = clamp(s.stats.nutrition + 20, 0, 100);
      s.stats.mood      = clamp(s.stats.mood + 4, 0, 100);
    },
    xp: { nutrition: 20 }
  },
  {
    id: 'work_hard', label: 'Work hard',
    desc: 'Devote serious effort to career, studies, or a major project.',
    effect(s) {
      s.stats.agency     = clamp(s.stats.agency + 10, 0, 100);
      s.stats.confidence = clamp(s.stats.confidence + 6, 0, 100);
      s.flags.hasJob     = true;
    },
    xp: { agency: 30 }
  },
  {
    id: 'invest_relationships', label: 'Invest in relationships',
    desc: 'Time and energy toward friends, family, community.',
    effect(s) {
      s.stats.social   = clamp(s.stats.social + 14, 0, 100);
      s.stats.mood     = clamp(s.stats.mood + 8, 0, 100);
      s.threats.loneliness = clamp(s.threats.loneliness - 18, 0, 100);
    },
    xp: { emotionalIntelligence: 20, social: 15 }
  },
  {
    id: 'drink_use', label: 'Lean on substances',
    desc: 'Alcohol or other substances become a regular crutch.',
    effect(s) {
      s.threats.substanceAbuse = clamp(s.threats.substanceAbuse + 18, 0, 100);
      s.stats.mood  = clamp(s.stats.mood + 5, 0, 100);
      s.stats.health = clamp(s.stats.health - 10, 0, 100);
      s.flags.substanceStreak = (s.flags.substanceStreak || 0) + 1;
    },
    xp: {}
  },
  {
    id: 'inner_work', label: 'Inner work',
    desc: 'Journaling, meditation, therapy — turning toward yourself.',
    effect(s) {
      s.stats.selfAwareness = clamp(s.stats.selfAwareness + 10, 0, 100);
      s.stats.emotionalIntelligence = clamp(s.stats.emotionalIntelligence + 8, 0, 100);
      s.stats.mood          = clamp(s.stats.mood + 7, 0, 100);
      s.threats.depression  = clamp(s.threats.depression - 12, 0, 100);

function buildAvailableActions() {
  return ALL_ACTIONS.filter(a => {
    if (!a.tierReq) return true;
    for (const [skill, tier] of Object.entries(a.tierReq)) {
      if ((STATE.skillTiers[skill] || 0) < tier) return false;
    }
    return true;
  });
}

// ════════════════════════════════════════════════
//  XP + SKILL TIERS
// ════════════════════════════════════════════════
const XP_THRESHOLDS = [0, 80, 200, 400];
const TIER_NAMES = { 0: 'Novice', 1: 'Developing', 2: 'Capable', 3: 'Mastered' };
const SKILL_LABELS = {
  agency: 'Agency', emotionalIntelligence: 'Emotional Intel.',
  selfAwareness: 'Self-Awareness', confidence: 'Confidence',
  social: 'Social', nutrition: 'Nutrition'
};

function awardXP(xpMap) {
  const leveled = [];
  for (const [skill, amount] of Object.entries(xpMap)) {
    if (!(skill in STATE.xp)) continue;
    STATE.xp[skill] = (STATE.xp[skill] || 0) + amount;
    const newTier = computeTier(STATE.xp[skill]);
    if (newTier > (STATE.skillTiers[skill] || 0)) {
      STATE.skillTiers[skill] = newTier;
      leveled.push({ skill, tier: newTier });
    }
  }
  return leveled;
}

function computeTier(xp) {
  let t = 0;
  for (let i = XP_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= XP_THRESHOLDS[i]) { t = i; break; }
  }
  return t;
}

// ════════════════════════════════════════════════
//  PASSIVE EFFECTS  (yearly scale)
// ════════════════════════════════════════════════
function computeYearlyPassiveEffects() {
  const s = STATE;
  // loneliness feeds depression
  if (s.threats.loneliness > 55) s.threats.depression = clamp(s.threats.depression + 6, 0, 100);
  // substance abuse degrades health
  if (s.threats.substanceAbuse > 30) s.stats.health = clamp(s.stats.health - Math.floor(s.threats.substanceAbuse / 15), 0, 100);
  // high depression suppresses mood
  if (s.threats.depression > 50) s.stats.mood = clamp(s.stats.mood - 8, 0, 100);
  // natural mood drift toward 50
  const drift = s.stats.mood < 50 ? 3 : -3;
  s.stats.mood = clamp(s.stats.mood + drift, 0, 100);
  // nutrition drift back to baseline
  s.stats.nutrition = clamp(s.stats.nutrition - 15, 0, 100);
  // poor nutrition degrades health over time
  if (s.stats.nutrition < 20) s.stats.health = clamp(s.stats.health - 3, 0, 100);
  else if (s.stats.nutrition > 65) s.stats.health = clamp(s.stats.health + 2, 0, 100);
  // therapy streak bonus
  if (s.flags.therapyStreak > 2) s.threats.depression = clamp(s.threats.depression - 4, 0, 100);
  // EQ tier reduces loneliness growth
  if (s.skillTiers.emotionalIntelligence >= 2) s.threats.loneliness = clamp(s.threats.loneliness - 5, 0, 100);
  // confidence tier: mood floor
  const moodFloor = s.skillTiers.confidence >= 1 ? 15 : 0;
  if (s.stats.mood < moodFloor) s.stats.mood = moodFloor;
  // prolonged substance use worsens
  if (s.flags.substanceStreak > 3) s.threats.substanceAbuse = clamp(s.threats.substanceAbuse + 5, 0, 100);
  // age-related health decline (mild, after 50)
  if (s.age > 50) s.stats.health = clamp(s.stats.health - Math.floor((s.age - 50) / 15), 0, 100);
}

// ════════════════════════════════════════════════
//  DEATH CONDITIONS
// ════════════════════════════════════════════════
function checkDeathConditions() {
  const s = STATE;
  if (s.stats.health <= 0) return { cause: 'health', text: 'Your body gave out — worn down by years of neglect and circumstance. The end came quietly, with unfamiliar faces nearby.' };
  if (s.threats.depression >= 90 && s.stats.agency <= 20) return { cause: 'depression', text: 'The darkness had been growing for a long time. In the end, it was simply too heavy to carry alone, and you had not let anyone close enough to help.' };
  if (s.threats.substanceAbuse >= 95) return { cause: 'substances', text: 'The substances that had once softened the edges eventually became the whole thing. An overdose. It was not entirely a surprise.' };
  if (s.age >= 80) return { cause: 'age', text: 'Eighty years. You made it. The body is done, but the life — the actual life — was full of more than you could have predicted at eighteen.' };
  return null;
}

function buildEpitaph(cause) {
  const tier = STATE.skillTiers.selfAwareness;
  const name = STATE.name;
  if (cause === 'age') {
    if (tier >= 3) return `"${name} understood themselves, and in doing so, understood others. That is no small thing."`;
    if (tier >= 2) return `"${name} tried to see clearly, even when it was painful. Most of the time, they succeeded."`;
    return `"${name} lived. Fully, imperfectly, and with occasional grace."`;
  }
  if (cause === 'depression') {
    if (tier >= 2) return `"${name} saw the pattern but could not break it. They knew, at least, that it was not their fault."`;
    return `"${name} carried more than most people knew. The weight finally won."`;
  }
  if (cause === 'substances') {
    if (tier >= 2) return `"${name} understood what was happening and could not stop it. Knowing and stopping are not the same thing."`;
    return `"${name} was looking for something. The substances were never it."`;
  }
  return `"${name} — brief, real, and more than the sum of their choices."`;
}

// ════════════════════════════════════════════════
//  EVENTS  — one per year, three outcomes
//  Outcome determined by dice roll (1–100) + modifier:
//    good    : roll > 65
//    neutral : roll 35–65
//    bad     : roll < 35
//  Modifier: (EQ + selfAwareness) / 10 * 1.5  (max +15)
// ════════════════════════════════════════════════
function rollOutcome(choiceMod = 0) {
  const statMod = ((STATE.stats.emotionalIntelligence + STATE.stats.selfAwareness) / 10) * 1.5;
  const roll = clamp(rand(1, 100) + statMod + choiceMod, 1, 115);
  if (roll > 65) return 'good';
  if (roll >= 35) return 'neutral';
  return 'bad';
}

      bad:     { text: "It ends. The ending is honest, if not kind. You spend months in the afterwards. Eventually, the afterwards becomes just your life.", stat(s) { s.flags.inRelationship = false; s.stats.mood = clamp(s.stats.mood - 14, 0, 100); s.threats.loneliness = clamp(s.threats.loneliness + 18, 0, 100); s.threats.depression = clamp(s.threats.depression + 8, 0, 100); }, xp: {} }
    }
  },
  {
    id: 'depression_crisis',
    title: 'The floor drops',
    condition: s => s.threats.depression > 50,
    weight: 7,
    text: "This year the depression is not background noise. It is the whole room. There are months where functioning is the entire ambition, and months where even that fails.",
    choices: [
      { label: 'Tell someone — do not carry this alone', modifier: +14 },
      { label: 'Get through it alone, as you always have', modifier: -12 }
    ],

      good:    { text: "You reach out. Someone helps. The floor comes back up, slowly. By the end of the year, you have a language for what happened and people who know about it.", stat(s) { s.threats.depression = clamp(s.threats.depression - 20, 0, 100); s.stats.selfAwareness = clamp(s.stats.selfAwareness + 10, 0, 100); s.stats.emotionalIntelligence = clamp(s.stats.emotionalIntelligence + 8, 0, 100); }, xp: { emotionalIntelligence: 35, selfAwareness: 25 } },
      neutral: { text: "You survive the year. The floor stays low but does not disappear entirely. You keep moving. It costs everything you have, and you keep moving anyway.", stat(s) { s.stats.mood = clamp(s.stats.mood - 5, 0, 100); s.threats.loneliness = clamp(s.threats.loneliness + 6, 0, 100); }, xp: {} },
      bad:     { text: "The year is one of the worst. You get through it alone, by fractions. The darkness recedes eventually, but it leaves marks.", stat(s) { s.stats.mood = clamp(s.stats.mood - 12, 0, 100); s.threats.loneliness = clamp(s.threats.loneliness + 15, 0, 100); s.stats.health = clamp(s.stats.health - 6, 0, 100); }, xp: {} }
    }

    ],

// Fire exactly one event per year
function selectYearEvent() {
  const eligible = EVENTS.filter(e => e.condition(STATE));
  if (!eligible.length) return null;
  const totalWeight = eligible.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * totalWeight;
  for (const e of eligible) {
    r -= e.weight;
    if (r <= 0) return e;
  }
  return eligible[eligible.length - 1];
}

// ════════════════════════════════════════════════
//  APPLY ACTIONS + ADVANCE YEAR
// ════════════════════════════════════════════════
function applyActions(actionIds) {
  let allXP = {};
  let usedSubstance = false;
  let usedExercise  = false;
  let usedTherapy   = false;

  for (const id of actionIds) {
    const action = ALL_ACTIONS.find(a => a.id === id);
    if (!action) continue;
    action.effect(STATE);
    for (const [k, v] of Object.entries(action.xp)) allXP[k] = (allXP[k] || 0) + v;
    if (id === 'drink_use')        usedSubstance = true;
    if (id === 'prioritize_health') usedExercise = true;
    if (id === 'inner_work')       usedTherapy  = true;
  }

  if (!usedSubstance) STATE.flags.substanceStreak = 0;
  if (!usedExercise)  STATE.flags.exerciseStreak  = 0;
  if (!usedTherapy)   STATE.flags.therapyStreak   = 0;

  return awardXP(allXP);
}

function advanceCalendar() {
  STATE.year++;
  STATE.age = 18 + (STATE.year - 1);
  STATE.flags.actionsChosenThisYear = [];
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function render() {
  renderTopBar();
  renderStats();
  renderLog();
  renderActions();
}

function renderTopBar() {
  document.getElementById('tb-name').textContent  = STATE.name;
  document.getElementById('tb-age').textContent   = Math.floor(STATE.age);
  document.getElementById('tb-year').textContent  = STATE.year;
  document.getElementById('tb-phase').textContent = STATE.phase;
}

function renderStats() {
  const s = STATE.stats;
  const vitals = [
    { key: 'health',  label: 'Health',    cls: 'bar-health' },
    { key: 'mood',    label: 'Mood',      cls: 'bar-mood'   },
    { key: 'social',  label: 'Social',    cls: 'bar-social' },
    { key: 'nutrition',label: 'Nutrition',cls: 'bar-nutr'   }
  ];
  const skills = [
    { key: 'agency',               label: 'Agency',           cls: 'bar-agency' },
    { key: 'emotionalIntelligence',label: 'Emotional Intel.', cls: 'bar-eq'     },
    { key: 'selfAwareness',        label: 'Self-Awareness',   cls: 'bar-self'   },
    { key: 'confidence',           label: 'Confidence',       cls: 'bar-conf'   }
  ];

  document.getElementById('vitals-bars').innerHTML = vitals.map(v => barRow(v.label, s[v.key], v.cls)).join('');
  document.getElementById('skills-bars').innerHTML = skills.map(v => {
    const tier = STATE.skillTiers[v.key] || 0;
    const badge = tier > 0 ? `<span class="tier-badge">T${tier}</span>` : '';
    return barRow(v.label + badge, s[v.key], v.cls, true);
  }).join('');

  const t = STATE.threats;
  document.getElementById('threat-bars').innerHTML = [
    { key: 'depression',     label: 'Depression'     },
    { key: 'substanceAbuse', label: 'Substance Abuse' },
    { key: 'loneliness',     label: 'Loneliness'     }
  ].map(th => {
    const val = t[th.key];
    return `<div class="stat-row threat-row ${val > 70 ? 'high' : ''}">
      <div class="stat-label">${escHtml(th.label)}<span>${val}</span></div>
      <div class="bar-track"><div class="bar-fill bar-threat" style="width:${val}%"></div></div>
    </div>`;
  }).join('');
}

function barRow(label, value, cls, raw = false) {
  const pct = clamp(value, 0, 100);
  return `<div class="stat-row">
    <div class="stat-label">${raw ? label : escHtml(label)}<span>${Math.round(value)}</span></div>
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLog() {
  const el = document.getElementById('story-log');
  const entries = STATE.log.slice(-50).reverse();
  el.innerHTML = entries.map(e => `
    <div class="log-entry type-${e.type}">
      <div class="log-meta">Age ${Math.floor(e.age)}</div>
      <div class="log-text">${escHtml(e.text)}</div>
    </div>`).join('');
}

function renderActions() {
  const available = buildAvailableActions();
  const chosen    = STATE.flags.actionsChosenThisYear;

  const grid = document.getElementById('actions-grid');
  grid.innerHTML = available.map(a => {
    const isChosen  = chosen.includes(a.id);
    const maxChosen = chosen.length >= 2 && !isChosen;
    return `<button class="action-btn ${isChosen ? 'selected' : ''}" ${maxChosen ? 'disabled' : ''}
      data-id="${a.id}" title="${escHtml(a.desc)}">
      ${escHtml(a.label)}
    </button>`;
  }).join('');

  grid.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleAction(btn.dataset.id));
  });

  const n = chosen.length;
  document.getElementById('selections-info').textContent =
    n === 0 ? 'No priorities chosen yet.' :
    n === 1 ? '1 priority chosen.' :
    '2 priorities chosen.';

  document.getElementById('next-year-btn').disabled = false;
}

function toggleAction(id) {
  const chosen = STATE.flags.actionsChosenThisYear;
  const idx = chosen.indexOf(id);
  if (idx >= 0) chosen.splice(idx, 1);
  else if (chosen.length < 2) chosen.push(id);
  renderActions();
}

// ════════════════════════════════════════════════
//  NEXT YEAR
// ════════════════════════════════════════════════
document.getElementById('next-year-btn').addEventListener('click', () => {
  if (STATE.phase !== 'playing') return;
  endOfYear();
});

function endOfYear() {
  const chosen = STATE.flags.actionsChosenThisYear;

  // Apply chosen priorities
  const leveled = applyActions(chosen);

  // Year narrative
  const narr = generateYearNarrative();
  appendLog(narr, 'normal');

  // Passive effects
  computeYearlyPassiveEffects();

  // Check death
  const death = checkDeathConditions();
  if (death) {
    STATE.phase = 'dead';
    advanceCalendar();
    render();
    showDeathModal(death);
    return;
  }

  // Pick this year's event
  const ev = selectYearEvent();

  // Level-ups first, then event
  if (leveled.length > 0) {
    showLevelUpModal(leveled, () => {
      advanceCalendar();
      render();
      if (ev) showEventModal(ev);
    });
    return;
  }

  advanceCalendar();
  render();
  if (ev) showEventModal(ev);
}

// ════════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════════
function showModal(titleHtml, bodyHtml, choicesHtml, titleClass = '') {
  document.getElementById('modal-title').innerHTML = titleHtml;
  document.getElementById('modal-title').className = titleClass;
  document.getElementById('modal-body').innerHTML   = bodyHtml;
  document.getElementById('modal-choices').innerHTML = choicesHtml;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function showEventModal(ev) {
  STATE.phase = 'event';

  // Step 1: show event description + player choices
  const choicesHtml = (ev.choices || []).map((c, i) =>
    `<button class="modal-choice-btn" data-idx="${i}">${escHtml(c.label)}</button>`
  ).join('');

  showModal(escHtml(ev.title), escHtml(ev.text), choicesHtml, '');

  document.querySelectorAll('.modal-choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const choiceIdx = parseInt(btn.dataset.idx, 10);
      const choiceMod = ev.choices[choiceIdx].modifier;
      const choiceLabel = ev.choices[choiceIdx].label;

      // Step 2: roll outcome with choice modifier applied
      const outcome = rollOutcome(choiceMod);
      const o = ev.outcomes[outcome];
      if (o.stat) o.stat(STATE);
      if (o.xp)   awardXP(o.xp);
      appendLog(`[${ev.title}] You chose: "${choiceLabel}". ${o.text}`, outcome);

      const tagLabel   = outcome.charAt(0).toUpperCase() + outcome.slice(1);
      const titleClass = outcome === 'good' ? 'modal-title-green' : outcome === 'neutral' ? 'modal-title-blue' : '';
      const btnClass   = outcome === 'good' ? 'blue' : outcome === 'neutral' ? 'blue' : '';

      showModal(
        escHtml(ev.title),
        `<span class="outcome-tag ${outcome}">${tagLabel}</span>
         <p style="font-size:0.8rem;color:#888;margin-bottom:0.8rem;font-style:italic">"${escHtml(choiceLabel)}"</p>
         ${escHtml(o.text)}`,
        `<button class="modal-single-btn ${btnClass}" id="modal-continue">Continue</button>`,
        titleClass
      );
      STATE.phase = 'playing';
      render();
      document.getElementById('modal-continue').addEventListener('click', () => {
        hideModal();
        render();
      });
    });
  });
}

function showLevelUpModal(leveled, callback) {
  const lines = leveled.map(l =>
    `<strong>${SKILL_LABELS[l.skill] || l.skill}</strong> → Tier ${l.tier}: ${TIER_NAMES[l.tier]}.`
  ).join('<br>');
  showModal(
    'Growth',
    lines + '<br><br>Something has solidified in you. A capability that used to require effort begins to feel like a reflex.',
    `<button class="modal-single-btn purple" id="modal-lvl-ok">Continue</button>`,
    'modal-title-purple'
  );
  document.getElementById('modal-lvl-ok').addEventListener('click', () => {
    hideModal();
    callback();
  });
}

function showDeathModal(death) {
  const epitaph = buildEpitaph(death.cause);
  const goodYears = STATE.log.filter(e => e.type === 'good').length;
  const badYears  = STATE.log.filter(e => e.type === 'bad').length;
  const summary = `
    <p style="color:#888;font-size:0.82rem;margin-bottom:1rem">LIFE SUMMARY</p>
    <p>${escHtml(death.text)}</p>
    <br>
    <p style="color:#a8dadc;font-style:italic;margin-bottom:1.2rem">${escHtml(epitaph)}</p>
    <p style="font-size:0.82rem;color:#888;line-height:1.8">
      Years lived: ${STATE.year - 1} &nbsp;·&nbsp;
      Final age: ${Math.floor(STATE.age)} &nbsp;·&nbsp;
      Good outcomes: ${goodYears} &nbsp;·&nbsp;
      Hard outcomes: ${badYears}<br>
      Peak health: ${STATE.stats.health} &nbsp;·&nbsp;
      Final mood: ${STATE.stats.mood}
    </p>`;
  showModal(
    death.cause === 'age' ? 'A life fully lived' : 'The end',
    summary,
    `<button class="modal-single-btn ${death.cause === 'age' ? 'blue' : ''}" id="modal-restart">Play Again</button>`,
    death.cause === 'age' ? 'modal-title-blue' : ''
  );
  document.getElementById('modal-restart').addEventListener('click', () => {
    hideModal();
    document.getElementById('intro-screen').classList.remove('hidden');
    document.getElementById('name-input').value = '';
    document.getElementById('story-log').innerHTML = '';
  });
}

// ════════════════════════════════════════════════
//  INTRO
// ════════════════════════════════════════════════
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

function startGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-error').textContent = 'Please enter a name.'; return; }
  document.getElementById('name-error').textContent = '';
  document.getElementById('intro-screen').classList.add('hidden');
  initNewGame(name);
}

document.getElementById('next-year-btn').disabled = true;
</script>
